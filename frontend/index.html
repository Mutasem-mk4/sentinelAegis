<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SentinelAegis SOC Dashboard</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --border-color: #30363d;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --accent-yellow: #d29922;
            --accent-red: #f85149;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            --font-mono: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.5;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── HEADER ── */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
            background-color: var(--panel-bg);
            border-bottom: 1px solid var(--border-color);
            height: 60px;
        }
        .logo-area { display: flex; align-items: center; gap: 12px; font-weight: 700; font-size: 1.25rem; letter-spacing: -0.5px; }
        .logo-icon { color: var(--accent-blue); font-size: 1.5rem; }
        
        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-radius: 9999px;
            font-size: 0.8rem;
            font-weight: 600;
            background-color: rgba(63, 185, 80, 0.1);
            color: var(--accent-green);
            border: 1px solid rgba(63, 185, 80, 0.2);
            transition: all 0.3s ease;
        }
        .status-badge.disconnected {
            background-color: rgba(248, 81, 73, 0.1);
            color: var(--accent-red);
            border-color: rgba(248, 81, 73, 0.2);
        }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background-color: currentColor; }
        .status-badge:not(.disconnected) .status-dot { animation: pulse 2s infinite; }

        /* ── STATS BAR ── */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
        }
        .stat-card {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            transition: transform 0.2s, border-color 0.2s;
        }
        .stat-card:hover { border-color: var(--accent-blue); transform: translateY(-2px); }
        .stat-title { font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 8px; }
        .stat-value { font-family: var(--font-mono); font-size: 1.75rem; font-weight: 700; color: #fff; transition: color 0.3s; }
        .stat-value.flash { color: var(--accent-green); }

        /* ── MAIN LAYOUT ── */
        .main-content {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 16px;
            padding: 16px 24px;
            flex: 1;
            overflow: hidden;
        }

        /* ── LEFT PANEL (FEED & CONTROLS) ── */
        .left-panel { display: flex; flex-direction: column; gap: 16px; overflow: hidden; }
        
        .controls {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .btn {
            padding: 10px 16px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background-color: #21262d;
            color: var(--text-primary);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }
        .btn:hover:not(:disabled) { background-color: #30363d; border-color: #8b949e; }
        .btn-primary { background-color: var(--accent-blue); color: #fff; border-color: var(--accent-blue); }
        .btn-primary:hover:not(:disabled) { background-color: #1f6feb; border-color: #1f6feb; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .feed-panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .panel-header { padding: 12px 16px; border-bottom: 1px solid var(--border-color); font-weight: 600; font-size: 0.9rem; }
        .feed-list { padding: 12px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .empty-feed { color: var(--text-secondary); text-align: center; margin-top: 40px; font-size: 0.85rem; font-style: italic; }

        .feed-item {
            padding: 10px;
            border-radius: 6px;
            background-color: #21262d;
            border: 1px solid var(--border-color);
            font-size: 0.8rem;
            animation: slideIn 0.3s ease-out;
            border-left: 3px solid var(--border-color);
        }
        .feed-item.analyzing { border-left-color: var(--accent-blue); }
        .feed-item.HALT { border-left-color: var(--accent-red); background-color: rgba(248, 81, 73, 0.05); }
        .feed-item.REVIEW { border-left-color: var(--accent-yellow); }
        .feed-item.APPROVE { border-left-color: var(--accent-green); }

        /* ── RIGHT PANEL (TABLE) ── */
        .right-panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .table-container { flex: 1; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th {
            position: sticky; top: 0; background-color: #161b22; z-index: 10;
            padding: 12px 16px; font-size: 0.75rem; text-transform: uppercase; color: var(--text-secondary);
            border-bottom: 1px solid var(--border-color);
        }
        td { padding: 14px 16px; border-bottom: 1px solid var(--border-color); font-size: 0.85rem; vertical-align: top; }
        
        .row-main:hover { background-color: rgba(255,255,255,0.02); cursor: pointer; }
        .row-details { background-color: #0d1117; display: none; }
        .row-details.open { display: table-row; }
        
        .badge { padding: 2px 8px; border-radius: 12px; font-size: 0.7rem; font-weight: 600; display: inline-block; }
        .badge.HALT { background: rgba(248,81,73,0.15); color: var(--accent-red); border: 1px solid rgba(248,81,73,0.3); }
        .badge.REVIEW { background: rgba(210,153,34,0.15); color: var(--accent-yellow); border: 1px solid rgba(210,153,34,0.3); }
        .badge.APPROVE { background: rgba(63,185,80,0.15); color: var(--accent-green); border: 1px solid rgba(63,185,80,0.3); }

        .agent-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; padding: 16px 0; }
        .agent-card { background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 6px; padding: 12px; }
        .agent-title { font-size: 0.75rem; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 8px; }
        .agent-explanation { font-size: 0.8rem; color: var(--text-primary); margin-top: 8px; font-style: italic; }

        /* ── MODALS & TOASTS ── */
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
        .modal.open { display: flex; }
        .modal-content { background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 8px; width: 500px; padding: 24px; }
        .modal-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 16px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 6px; }
        .form-group input, .form-group textarea { width: 100%; background: #0d1117; border: 1px solid var(--border-color); color: #c9d1d9; padding: 8px 12px; border-radius: 6px; font-family: var(--font-family); }
        .form-group textarea { height: 100px; resize: vertical; }

        #toast { position: fixed; bottom: 24px; right: 24px; background: var(--accent-red); color: white; padding: 12px 24px; border-radius: 6px; font-weight: 600; font-size: 0.85rem; transform: translateY(100px); opacity: 0; transition: 0.3s; z-index: 9999; }
        #toast.show { transform: translateY(0); opacity: 1; }

        @keyframes pulse { 0% { opacity: 1; box-shadow: 0 0 0 0 rgba(63, 185, 80, 0.4); } 70% { opacity: 0.5; box-shadow: 0 0 0 6px rgba(63, 185, 80, 0); } 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(63, 185, 80, 0); } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        
        .flash-red-screen { animation: flashRed 0.5s ease-out; }
        @keyframes flashRed { 0% { box-shadow: inset 0 0 100px rgba(248,81,73,0.5); } 100% { box-shadow: inset 0 0 0 transparent; } }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <span class="logo-icon">🛡️</span> SentinelAegis SOC
    </div>
    <div class="status-badge disconnected" id="conn-status">
        <div class="status-dot"></div> <span id="conn-text">DISCONNECTED</span>
    </div>
</header>

<div class="stats-bar">
    <div class="stat-card">
        <div class="stat-title">Emails Analyzed</div>
        <div class="stat-value" id="stat-count">0</div>
    </div>
    <div class="stat-card">
        <div class="stat-title">Amount Screened</div>
        <div class="stat-value" id="stat-amount">$0</div>
    </div>
    <div class="stat-card">
        <div class="stat-title">Threats Blocked</div>
        <div class="stat-value" id="stat-threats">0</div>
    </div>
    <div class="stat-card">
        <div class="stat-title">Avg Response</div>
        <div class="stat-value" id="stat-latency">0 ms</div>
    </div>
</div>

<div class="main-content">
    <div class="left-panel">
        <div class="controls">
            <button class="btn btn-primary" id="btn-run-all" onclick="runAllScenarios()">🚀 Run All 5 Demo Scenarios</button>
            <button class="btn" onclick="openCustomModal()">🎭 Trigger Custom BEC Scenario</button>
        </div>
        
        <div class="feed-panel">
            <div class="panel-header">📨 Real-time Mail Ingestion</div>
            <div class="feed-list" id="feed-list">
                <div class="empty-feed" id="empty-feed">Awaiting incoming data...</div>
            </div>
        </div>
    </div>

    <div class="right-panel">
        <div class="panel-header">🚨 Consensus Ledger</div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Transaction ID</th>
                        <th>Vendor</th>
                        <th>Amount</th>
                        <th>Consensus</th>
                        <th>Risk Score</th>
                        <th>Latency</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- Rows appended dynamically -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Custom Scenario Modal -->
<div class="modal" id="custom-modal">
    <div class="modal-content">
        <div class="modal-title">Trigger Custom Analysis</div>
        <div class="form-group">
            <label>Transaction ID</label>
            <input type="text" id="custom-tx" value="TXN-999">
        </div>
        <div class="form-group">
            <label>Vendor</label>
            <input type="text" id="custom-vendor" value="Acme Corp">
        </div>
        <div class="form-group">
            <label>Amount (USD)</label>
            <input type="number" id="custom-amount" value="500000">
        </div>
        <div class="form-group">
            <label>Email Body</label>
            <textarea id="custom-body">URGENT: Please process this invoice to our new banking details immediately.</textarea>
        </div>
        <div style="display:flex; justify-content:flex-end; gap:12px; margin-top: 20px;">
            <button class="btn" onclick="closeCustomModal()">Cancel</button>
            <button class="btn btn-primary" id="btn-submit-custom" onclick="submitCustomScenario()">Submit Analysis</button>
        </div>
    </div>
</div>

<div id="toast">Error occurred</div>

<script>
    let stats = { count: 0, amount: 0, threats: 0, totalLatency: 0 };
    const API_BASE = '';

    // Initialize Health Check
    async function checkHealth() {
        try {
            const res = await fetch(`${API_BASE}/health`);
            if (res.ok) {
                const el = document.getElementById('conn-status');
                el.classList.remove('disconnected');
                document.getElementById('conn-text').textContent = 'CONNECTED';
            }
        } catch (e) {
            console.warn('Health check failed', e);
        }
    }
    checkHealth();
    setInterval(checkHealth, 10000);

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    function animateStat(id, newValue, isCurrency = false) {
        const el = document.getElementById(id);
        el.textContent = isCurrency ? `$${newValue.toLocaleString()}` : newValue;
        el.classList.add('flash');
        setTimeout(() => el.classList.remove('flash'), 300);
    }

    function updateStats(amount, decision, latency) {
        stats.count++;
        stats.amount += amount;
        if (decision === 'HALT') stats.threats++;
        stats.totalLatency += latency;
        
        animateStat('stat-count', stats.count);
        animateStat('stat-amount', stats.amount, true);
        animateStat('stat-threats', stats.threats);
        animateStat('stat-latency', Math.round(stats.totalLatency / stats.count) + ' ms');
    }

    function addToFeed(txId, status) {
        const empty = document.getElementById('empty-feed');
        if(empty) empty.style.display = 'none';
        
        const feed = document.getElementById('feed-list');
        const item = document.createElement('div');
        item.className = `feed-item ${status}`;
        item.id = `feed-${txId}`;
        item.innerHTML = `<strong>${txId}</strong> - Processing via secure gateway...`;
        feed.prepend(item);
    }

    function updateFeed(txId, decision) {
        const item = document.getElementById(`feed-${txId}`);
        if(item) {
            item.className = `feed-item ${decision}`;
            item.innerHTML = `<strong>${txId}</strong> - Analysis complete: <span class="badge ${decision}">${decision}</span>`;
            if (decision === 'HALT') {
                document.body.classList.remove('flash-red-screen');
                void document.body.offsetWidth; // trigger reflow
                document.body.classList.add('flash-red-screen');
            }
        }
    }

    function toggleRow(txId) {
        const details = document.getElementById(`details-${txId}`);
        if (details) details.classList.toggle('open');
    }

    function addTableRow(data, amount, vendor) {
        const tbody = document.getElementById('table-body');
        const dec = data.consensus.decision;
        const colorClass = dec === 'HALT' ? 'accent-red' : dec === 'REVIEW' ? 'accent-yellow' : 'accent-green';
        
        const row = document.createElement('tr');
        row.className = 'row-main';
        row.onclick = () => toggleRow(data.transaction_id);
        row.innerHTML = `
            <td><span style="font-family:var(--font-mono)">${data.transaction_id}</span></td>
            <td>${vendor}</td>
            <td style="font-family:var(--font-mono)">$${amount.toLocaleString()}</td>
            <td><span class="badge ${dec}">${dec}</span></td>
            <td><strong style="color:var(--${colorClass})">${data.consensus.risk_score}</strong>/100</td>
            <td style="font-family:var(--font-mono); font-size:0.75rem; color:var(--text-secondary)">${data.latency_ms}ms</td>
        `;
        
        const agentsHtml = data.consensus.agent_breakdown.map(a => `
            <div class="agent-card">
                <div class="agent-title">${a.agent_name.replace('_', ' ')} · ${a.risk_level} RISK</div>
                <div style="font-family:var(--font-mono); font-size:1.1rem; color:#fff">${(a.confidence*100).toFixed(0)}% CONFIDENCE</div>
                <div class="agent-explanation">${a.explanation}</div>
            </div>
        `).join('');

        const detailsRow = document.createElement('tr');
        detailsRow.id = `details-${data.transaction_id}`;
        detailsRow.className = 'row-details';
        detailsRow.innerHTML = `
            <td colspan="6" style="padding:0">
                <div style="padding: 16px 24px; border-bottom: 1px solid var(--border-color);">
                    <div style="font-weight:600; margin-bottom:8px">Consensus Explanation:</div>
                    <div style="font-size:0.85rem; color:var(--text-secondary); margin-bottom:16px">${data.consensus.explanation}</div>
                    <div class="agent-grid">${agentsHtml}</div>
                </div>
            </td>
        `;
        
        tbody.prepend(detailsRow);
        tbody.prepend(row);
    }

    async function analyzeTx(txId, amount, vendor) {
        addToFeed(txId, 'analyzing');
        try {
            const res = await fetch(`${API_BASE}/api/analyze`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ transaction_id: txId })
            });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            
            updateFeed(txId, data.consensus.decision);
            addTableRow(data, amount, vendor);
            updateStats(amount, data.consensus.decision, data.latency_ms);
            
        } catch (e) {
            console.error(e);
            showToast(`Analysis failed for ${txId}`);
            updateFeed(txId, 'ERROR');
        }
    }

    async function runAllScenarios() {
        const btn = document.getElementById('btn-run-all');
        btn.disabled = true;
        btn.textContent = '⏳ Processing...';
        
        const demos = [
            { id: 'TXN-001', vendor: 'Global Tech', amount: 1500 },
            { id: 'TXN-002', vendor: 'Delta Supplies', amount: 125000 },
            { id: 'TXN-003', vendor: 'Marketing Partners', amount: 12000 },
            { id: 'TXN-004', vendor: 'Greenfield Solutions', amount: 847000 },
            { id: 'TXN-005', vendor: 'SecureHost LLC', amount: 450 }
        ];

        for (const tx of demos) {
            await analyzeTx(tx.id, tx.amount, tx.vendor);
            await new Promise(r => setTimeout(r, 1000));
        }

        btn.disabled = false;
        btn.textContent = '🚀 Run All 5 Demo Scenarios';
    }

    function openCustomModal() { document.getElementById('custom-modal').classList.add('open'); }
    function closeCustomModal() { document.getElementById('custom-modal').classList.remove('open'); }

    async function submitCustomScenario() {
        const btn = document.getElementById('btn-submit-custom');
        const txId = document.getElementById('custom-tx').value || 'TXN-CUST';
        const vendor = document.getElementById('custom-vendor').value || 'Unknown';
        const amount = parseInt(document.getElementById('custom-amount').value) || 0;
        const bodyText = document.getElementById('custom-body').value;

        btn.disabled = true;
        closeCustomModal();
        addToFeed(txId, 'analyzing');

        try {
            const res = await fetch(`${API_BASE}/api/analyze/custom`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email_body: bodyText,
                    vendor_name: vendor,
                    amount: amount,
                    current_iban: 'GB29NWBK60161331926819',
                    iban_changed_hours_ago: 2
                })
            });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            
            data.transaction_id = txId; // Ensure ID matches
            updateFeed(txId, data.consensus.decision);
            addTableRow(data, amount, vendor);
            updateStats(amount, data.consensus.decision, data.latency_ms);
            
        } catch (e) {
            console.error(e);
            showToast(`Custom analysis failed`);
            updateFeed(txId, 'ERROR');
        } finally {
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
