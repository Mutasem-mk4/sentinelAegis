<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>SentinelAegis SOC — Real-time Monitoring</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
            --bg:#070a13;--bg-card:#0f172a;--bg-alt:#1e293b;
            --blue:#3b82f6;--red:#ef4444;--yellow:#f59e0b;--green:#10b981;
            --t1:#f1f5f9;--t2:#94a3b8;--border:#1e293b;
            --grad:linear-gradient(135deg,#3b82f6,#6366f1,#8b5cf6);
            --glow:rgba(59,130,246,0.25);
            --font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
        }
        body{font-family:var(--font);background:var(--bg);color:var(--t1);line-height:1.6;height:100vh;overflow:hidden;display:flex;flex-direction:column}
        
        /* ── Header ── */
        .hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:rgba(15,23,42,.8);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);z-index:100}
        .hdr-brand{display:flex;align-items:center;gap:12px}
        .hdr-logo{color:var(--blue);width:32px;height:32px}
        .hdr-name{font-size:1.2rem;font-weight:800;letter-spacing:-0.02em}
        .hdr-live{display:flex;align-items:center;gap:6px;font-size:.7rem;font-weight:700;background:rgba(16,185,129,.1);color:var(--green);padding:4px 10px;border-radius:99px;border:1px solid rgba(16,185,129,.2)}
        .hdr-dot{width:8px;height:8px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
        .hdr-mon{font-size:.75rem;color:var(--t2);display:flex;align-items:center;gap:6px}

        /* ── Main Layout ── */
        .main{flex:1;display:grid;grid-template-columns:380px 1fr;gap:1px;background:var(--border);overflow:hidden}
        .panel{background:var(--bg);display:flex;flex-direction:column;overflow:hidden}
        .panel-hdr{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
        .panel-title{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--t2)}
        .panel-scroll{flex:1;overflow-y:auto;padding:16px}
        
        /* ── Metrics Bar ── */
        .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:16px 24px;background:var(--bg)}
        .mcard{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:14px 20px;transition:.2s}
        .mlbl{font-size:.65rem;color:var(--t2);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
        .mval{font-size:1.6rem;font-weight:800;font-family:var(--mono)}

        /* ── Email Feed ── */
        .feed-list{display:flex;flex-direction:column;gap:10px}
        .ecard{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:.2s;position:relative;overflow:hidden}
        .ecard:hover{border-color:var(--blue);background:rgba(59,130,246,.04)}
        .ecard.active{border-color:var(--blue);box-shadow:0 0 20px var(--glow);background:rgba(59,130,246,.08)}
        .ecard-status{position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--t2)}
        .ecard.analyzing .ecard-status{background:var(--blue);animation:scanY 2s infinite}
        .ecard.halt .ecard-status{background:var(--red)}
        .ecard.review .ecard-status{background:var(--yellow)}
        .ecard.approve .ecard-status{background:var(--green)}
        .ecard-from{font-size:.85rem;font-weight:700;margin-bottom:2px;display:flex;justify-content:space-between}
        .ecard-sub{font-size:.78rem;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .ecard-meta{display:flex;justify-content:space-between;align-items:center;margin-top:8px;font-size:.7rem;font-weight:600;color:var(--t2)}
        
        /* ── Analysis Panel ── */
        .empty-state{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--t2);gap:16px}
        .empty-icon{width:64px;height:64px;opacity:.2}
        
        .analysis-view{padding:24px;animation:fadeIn .4s ease}
        .a-hdr{margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--border)}
        .a-vendor{font-size:1.4rem;font-weight:800;margin-bottom:4px}
        .a-meta{display:flex;gap:20px;font-size:.8rem;color:var(--t2)}
        .a-body{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:16px;font-size:.85rem;line-height:1.6;color:var(--t2);margin:20px 0;max-height:140px;overflow-y:auto;white-space:pre-wrap}
        
        .agrid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
        .acard{background:var(--bg-card);border:2px solid var(--border);border-radius:12px;padding:18px;min-height:200px;transition:.5s;opacity:0;transform:translateY(10px)}
        .acard.show{opacity:1;transform:translateY(0)}
        .acard.r-HIGH{border-color:var(--red);box-shadow:0 0 20px rgba(239,68,68,.15)}
        .acard.r-MEDIUM{border-color:var(--yellow)}
        .acard.r-LOW{border-color:var(--green)}
        .ahdr{display:flex;align-items:center;gap:10px;margin-bottom:14px}
        .aicon{font-size:1.2rem}
        .atitle{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
        .arisk{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.65rem;font-weight:800;margin-top:4px}
        .aexpl{font-size:.72rem;color:var(--t2);margin-top:12px;line-height:1.5;font-style:italic}
        .aflags{list-style:none;margin-top:10px;font-size:.7rem;color:var(--t2)}
        .aflags li{padding:2px 0 2px 14px;position:relative}
        .aflags li::before{content:'•';position:absolute;left:0;color:var(--blue)}

        .con-banner{border-radius:12px;padding:24px;display:flex;align-items:center;gap:24px;margin-top:20px;opacity:0;transform:scale(.95);transition:.5s}
        .con-banner.show{opacity:1;transform:scale(1)}
        .con-banner.HALT{background:rgba(239,68,68,.08);border:2px solid var(--red);box-shadow:0 0 40px rgba(239,68,68,.2)}
        .con-banner.REVIEW{background:rgba(245,158,11,.08);border:2px solid var(--yellow)}
        .con-banner.APPROVE{background:rgba(16,185,129,.08);border:2px solid var(--green)}
        .con-info{flex:1}
        .con-dec{font-size:1.4rem;font-weight:900;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
        .con-expl{font-size:.85rem;color:var(--t2)}
        .con-score{font-family:var(--mono);font-size:2.8rem;font-weight:900}

        /* ── Buttons & UI ── */
        .btn-demo{width:100%;margin-top:auto;padding:12px;background:var(--bg-alt);border:1px solid var(--border);color:var(--t1);border-radius:8px;font-weight:700;font-size:.75rem;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:8px}
        .btn-demo:hover{background:var(--border)}
        
        .badge-live{background:var(--red);color:#fff;font-size:.6rem;padding:1px 4px;border-radius:3px;margin-left:6px;vertical-align:middle}

        /* ── Animations ── */
        @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.2)}}
        @keyframes scanY{0%{top:0;height:0}50%{top:0;height:100%}100%{top:100%;height:0}}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        @keyframes flashRed{0%,100%{background:transparent}50%{background:rgba(239,68,68,.15)}}
        .flash-red{animation:flashRed .4s 2}

        ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
    </style>
</head>
<body>
    <header class="hdr">
        <div class="hdr-brand">
            <svg class="hdr-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            <div>
                <div class="hdr-name">SentinelAegis <span class="badge-live">SOC</span></div>
                <div class="hdr-mon" id="mon-addr">Monitoring inbox: sentinel-demo@gmail.com</div>
            </div>
        </div>
        <div style="display:flex;gap:20px;align-items:center">
            <div class="hdr-live"><div class="hdr-dot"></div>LIVE MONITORING</div>
            <div class="hdr-mon" style="font-family:var(--mono)">3 Agents · Gemini 1.5 Pro</div>
        </div>
    </header>

    <div class="metrics">
        <div class="mcard"><div class="mlbl">Emails Analyzed</div><div class="mval" id="m-count">0</div></div>
        <div class="mcard"><div class="mlbl">Amount Screened</div><div class="mval" id="m-amount">$0</div></div>
        <div class="mcard"><div class="mlbl">Threats Blocked</div><div class="mval" id="m-threats">0</div></div>
        <div class="mcard"><div class="mlbl">Avg Response</div><div class="mval" id="m-latency">—</div></div>
    </div>

    <div class="main">
        <div class="panel">
            <div class="panel-hdr">
                <div class="panel-title">📨 Live Email Feed</div>
                <div id="conn-status" style="font-size:.65rem;font-weight:700;color:var(--green)">CONNECTED</div>
            </div>
            <div class="panel-scroll">
                <div class="feed-list" id="email-feed">
                    <!-- Emails scroll in here -->
                </div>
            </div>
            <div style="padding:16px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px">
                <button class="btn-demo" onclick="runAllScenarios()" id="btn-all" style="background:linear-gradient(135deg,#3b82f6,#6366f1);border:none">🚀 Run All 5 Demo Scenarios</button>
                <button class="btn-demo" onclick="runDemo()">🎭 Trigger Custom BEC Scenario</button>
            </div>
        </div>

        <div class="panel" id="analysis-panel">
            <div class="empty-state">
                <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><circle cx="12" cy="12" r="3"/></svg>
                <div style="text-align:center">
                    <div style="font-weight:700;margin-bottom:4px">Awaiting incoming data...</div>
                    <div style="font-size:.8rem;opacity:.6">System is monitoring for suspicious BEC activity</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s);
        let analyses=[],stats={count:0,amount:0,threats:0,latency:0};

        // ── Real-time Connection (SSE) ──
        function initSSE() {
            const ev = new EventSource('/api/stream');
            const status = $('#conn-status');

            ev.onmessage = (e) => {
                const data = JSON.parse(e.data);
                handleEvent(data);
            };

            ev.onerror = () => {
                status.textContent = 'RECONNECTING...';
                status.style.color = 'var(--yellow)';
            };

            ev.onopen = () => {
                status.textContent = 'CONNECTED';
                status.style.color = 'var(--green)';
            };
        }

        function handleEvent(ev) {
            if (ev.event_type === 'email_received') {
                addEmailToFeed(ev.email, 'analyzing');
            } else if (ev.event_type === 'consensus') {
                updateEmailInFeed(ev.email.message_id, ev.consensus.decision);
                updateMetrics(ev);
                // Auto-select and show if it's new
                showAnalysis(ev);
            }
        }

        function addEmailToFeed(email, status) {
            const feed = $('#email-feed');
            const id = `feed-${email.message_id}`;
            if ($( `#${id}`)) return; // Avoid duplicates

            const card = document.createElement('div');
            card.id = id;
            card.className = `ecard ${status}`;
            card.innerHTML = `
                <div class="ecard-status"></div>
                <div class="ecard-from"><span>${email.from.split('<')[0]}</span><span style="font-family:var(--mono)">${status === 'analyzing' ? '...' : ''}</span></div>
                <div class="ecard-sub">${email.subject}</div>
                <div class="ecard-meta"><span>${status.toUpperCase()}</span><span>${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span></div>
            `;
            card.onclick = () => {
                const existing = analyses.find(a => a.email.message_id === email.message_id);
                if (existing) showAnalysis(existing);
            };
            feed.prepend(card);
        }

        function updateEmailInFeed(msgID, decision) {
            const card = $(`#feed-${msgID}`);
            if (!card) return;
            card.className = `ecard ${decision.toLowerCase()}`;
            const label = card.querySelector('.ecard-meta span:first-child');
            const statusIcon = decision === 'HALT' ? '🚨' : decision === 'REVIEW' ? '⚡' : '✅';
            label.textContent = `${statusIcon} ${decision}`;
            
            if (decision === 'HALT') {
                card.classList.add('flash-red');
                playAlert();
            }
        }

        function showAnalysis(ev) {
            // Save to local list
            if (!analyses.find(a => a.email.message_id === ev.email.message_id)) {
                analyses.push(ev);
            }

            // Mark feed card as active
            $$('.ecard').forEach(c => c.classList.remove('active'));
            const card = $(`#feed-${ev.email.message_id}`);
            if (card) card.classList.add('active');

            const panel = $('#analysis-panel');
            const c = ev.consensus;
            const ag = c.agent_breakdown;
            const color = c.decision === 'HALT' ? 'var(--red)' : c.decision === 'REVIEW' ? 'var(--yellow)' : 'var(--green)';

            panel.innerHTML = `
                <div class="analysis-view">
                    <div class="a-hdr">
                        <div class="a-vendor">${ev.email.subject}</div>
                        <div class="a-meta">
                            <span>From: ${ev.email.from}</span>
                            <span>Time: ${new Date(ev.timestamp).toLocaleTimeString()}</span>
                            <span>ID: ${ev.email.message_id.slice(0,8)}</span>
                        </div>
                    </div>

                    <div class="agrid">
                        ${ag.map((a, i) => `
                            <div class="acard" id="ac-${i}">
                                <div class="ahdr">
                                    <div class="aicon">${i===0?'📧':i===1?'🏦':'⏰'}</div>
                                    <div class="atitle">${a.agent_name.replace('_',' ')}</div>
                                </div>
                                <div class="arisk" style="background:rgba(${a.risk_level==='HIGH'?'239,68,68':a.risk_level==='MEDIUM'?'245,158,11':'16,185,129'},.15);color:var(--${a.risk_level==='HIGH'?'red':a.risk_level==='MEDIUM'?'yellow':'green'})">
                                    ${a.risk_level} RISK
                                </div>
                                <div style="font-family:var(--mono);font-size:1.2rem;font-weight:800;margin-top:10px">${(a.confidence*100).toFixed(0)}%</div>
                                <ul class="aflags">${(a.flags||[]).slice(0,2).map(f=>`<li>${f}</li>`).join('')}</ul>
                                <div class="aexpl">${a.explanation.split('.')[0]}.</div>
                            </div>
                        `).join('')}
                    </div>

                    <div class="a-body">${ev.email.body}</div>

                    <div class="con-banner ${c.decision}" id="con-banner">
                        <div class="con-info">
                            <div class="con-dec" style="color:${color}">${c.decision === 'HALT' ? '🚨 TRANSACTION HALTED' : c.decision === 'REVIEW' ? '⚡ MANUAL REVIEW' : '✅ APPROVED'}</div>
                            <div class="con-expl">${c.explanation}</div>
                        </div>
                        <div class="con-score" style="color:${color}">${c.risk_score}</div>
                    </div>
                </div>
            `;

            // Sequential reveal
            setTimeout(() => $('#ac-0').classList.add('show'), 100);
            setTimeout(() => $('#ac-1').classList.add('show'), 600);
            setTimeout(() => $('#ac-2').classList.add('show'), 1100);
            setTimeout(() => $('#con-banner').classList.add('show'), 1600);

            if (c.decision === 'HALT') {
                document.body.style.boxShadow = 'inset 0 0 100px rgba(239,68,68,.1)';
                setTimeout(() => document.body.style.boxShadow = 'none', 1000);
            }
        }

        function updateMetrics(ev) {
            stats.count++;
            stats.latency = ((stats.latency * (stats.count-1)) + ev.latency_ms) / stats.count;
            if (ev.consensus.decision === 'HALT') stats.threats++;
            
            // Extract amount from email body/subject if possible
            const amtMatch = ev.email.body.match(/\$([\d,]+)/);
            if (amtMatch) stats.amount += parseInt(amtMatch[1].replace(/,/g, ''));
            else stats.amount += 50000;

            animateVal($('#m-count'), stats.count);
            $('#m-amount').textContent = `$${(stats.amount/1000).toFixed(0)}K`;
            animateVal($('#m-threats'), stats.threats);
            $('#m-latency').textContent = `${Math.round(stats.latency)}ms`;
        }

        function animateVal(el, target) {
            const start = parseInt(el.textContent) || 0;
            const dur = 500;
            const startTime = performance.now();
            function up(now) {
                const p = Math.min((now - startTime) / dur, 1);
                el.textContent = Math.round(start + (target - start) * p);
                if (p < 1) requestAnimationFrame(up);
            }
            requestAnimationFrame(up);
        }

        function playAlert() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.frequency.value = 440; gain.gain.value = 0.08;
                osc.start(); osc.stop(ctx.currentTime + 0.2);
            } catch(e) {}
        }

        async function runDemo() {
            // Simulated BEC email for Demo Day backup
            const demoEmail = {
                message_id: 'demo-' + Date.now(),
                from: 'CEO David <ceo@morrison-associates.com>',
                subject: 'URGENT: Change of Banking Details for Greenfield',
                body: "Sarah, I'm in back-to-back meetings. We need to update the payment for Greenfield Solutions immediately. Their new IBAN is GB29NWBK60161331926819. Please process the $847,000 transfer ASAP. Do not share this until confirmed.",
                date: new Date().toISOString()
            };
            
            handleEvent({ event_type: 'email_received', email: demoEmail });
            
            // Call actual analysis API to get real Gemini results
            try {
                const r = await fetch('/api/analyze/custom', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        email_body: demoEmail.body,
                        vendor_name: "Greenfield Solutions",
                        amount: 847000,
                        current_iban: "GB29NWBK60161331926819",
                        iban_changed_hours_ago: 2
                    })
                });
                const d = await r.json();
                handleEvent({
                    event_type: 'consensus',
                    email: demoEmail,
                    consensus: d.consensus,
                    latency_ms: d.latency_ms,
                    timestamp: new Date().toISOString()
                });
            } catch(e) { console.error(e); }
        }

        async function runAllScenarios() {
            const btn = $('#btn-all');
            btn.disabled = true;
            btn.textContent = '⏳ Running 5 scenarios...';

            // Fetch the 5 demo transactions
            let txns;
            try {
                const r = await fetch('/api/transactions');
                txns = await r.json();
            } catch(e) {
                btn.disabled = false;
                btn.textContent = '🚀 Run All 5 Demo Scenarios';
                return;
            }

            for (let i = 0; i < txns.length; i++) {
                const tx = txns[i];
                btn.textContent = `⏳ Analyzing ${i+1}/5 — ${tx.vendor}...`;

                // Show email appearing in feed
                const fakeEmail = {
                    message_id: tx.id,
                    from: tx.email_sender,
                    subject: tx.email_subject,
                    body: tx.email_text,
                    date: new Date().toISOString()
                };
                handleEvent({ event_type: 'email_received', email: fakeEmail });

                // Small delay for visual effect
                await new Promise(r => setTimeout(r, 500));

                // Call actual analysis API
                try {
                    const r = await fetch('/api/analyze', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ transaction_id: tx.id })
                    });
                    const d = await r.json();
                    handleEvent({
                        event_type: 'consensus',
                        email: fakeEmail,
                        consensus: d.consensus,
                        latency_ms: d.latency_ms,
                        timestamp: new Date().toISOString()
                    });
                } catch(e) { console.error(`Analysis failed for ${tx.id}:`, e); }

                // Wait between scenarios for dramatic effect
                if (i < txns.length - 1) {
                    await new Promise(r => setTimeout(r, 2500));
                }
            }

            btn.disabled = false;
            btn.textContent = '🚀 Run All 5 Demo Scenarios';
        }

        async function initStatus() {
            try {
                const r = await fetch('/api/status');
                const s = await r.json();
                if (s.inbox) $('#mon-addr').textContent = `Monitoring inbox: ${s.inbox}`;
            } catch(e) {}
        }

        document.addEventListener('DOMContentLoaded', () => {
            initSSE();
            initStatus();
        });
    </script>
</body>
</html>
