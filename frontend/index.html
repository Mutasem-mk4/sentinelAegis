<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SentinelAegis SOC</title>
    <style>
        :root {
            --bg-primary: #0a0e14;
            --bg-secondary: #12171f;
            --bg-card: #181e28;
            --border: #1e293b;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
            --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-sans);
            line-height: 1.5;
            min-height: 100vh;
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 24px 32px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 28px;
        }

        .logo-area h1 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #e2e8f0 0%, #38bdf8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .monitoring-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            background: var(--bg-card);
            padding: 8px 16px;
            border-radius: 100px;
            border: 1px solid var(--border);
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
            animation: pulse 2s infinite;
        }

        .status-indicator.disconnected {
            background: var(--danger);
            box-shadow: 0 0 8px var(--danger);
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .stat-value {
            font-family: var(--font-mono);
            font-size: 2.25rem;
            font-weight: 700;
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .action-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s ease;
            font-family: var(--font-sans);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--accent);
            color: #0a0e14;
            border-color: var(--accent);
        }

        .btn-primary:hover {
            background: #2bb0e6;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3);
        }

        .btn-secondary {
            background: transparent;
            border-color: var(--border);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: var(--bg-card);
            border-color: var(--text-secondary);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .table-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 14px 20px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            font-weight: 600;
        }

        td {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .badge {
            padding: 4px 12px;
            border-radius: 100px;
            font-weight: 700;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            display: inline-block;
        }

        .badge-halt {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .badge-review {
            background: rgba(245, 158, 11, 0.15);
            color: var(--warning);
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .badge-approve {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .expand-row {
            cursor: pointer;
            user-select: none;
        }

        .expand-icon {
            display: inline-block;
            transition: transform 0.2s ease;
            margin-right: 6px;
        }

        .expanded .expand-icon {
            transform: rotate(90deg);
        }

        .detail-row {
            display: none;
            background: var(--bg-secondary);
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .detail-row.show {
            display: block;
        }

        .agent-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .agent-card {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 14px;
            border: 1px solid var(--border);
        }

        .agent-name {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
            font-size: 0.8rem;
        }

        .risk-bar-bg {
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            margin-top: 8px;
            overflow: hidden;
        }

        .risk-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .risk-high { background: var(--danger); }
        .risk-mid { background: var(--warning); }
        .risk-low { background: var(--success); }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--danger);
            color: white;
            padding: 14px 24px;
            border-radius: 8px;
            font-weight: 500;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            align-items: center;
            justify-content: center;
            z-index: 999;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px;
            width: 90%;
            max-width: 520px;
        }

        .modal h2 {
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: 0.9rem;
        }

        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
        }

        .email-feed {
            margin-top: 24px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 20px;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .email-feed .title {
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.75rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        @media (max-width: 900px) {
            .stat-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .action-bar {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-area">
                <h1>SentinelAegis</h1>
            </div>
            <div class="monitoring-badge">
                <span class="status-indicator" id="connIndicator"></span>
                <span>Monitoring: kharma.mutasem@gmail.com</span>
            </div>
        </header>

        <div class="stat-grid">
            <div class="stat-card">
                <span class="stat-label">Emails Analyzed</span>
                <span class="stat-value" id="emailsAnalyzed">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Amount Screened</span>
                <span class="stat-value" id="amountScreened">$0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Threats Blocked</span>
                <span class="stat-value" id="threatsBlocked">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Avg Response</span>
                <span class="stat-value" id="avgResponse">—</span>
            </div>
        </div>

        <div class="action-bar">
            <button class="btn btn-primary" id="runAllBtn" onclick="runAllScenarios()">
                ⚡ Run All 5 Demo Scenarios
            </button>
            <button class="btn btn-secondary" id="customBtn" onclick="openCustomModal()">
                🧪 Trigger Custom BEC Scenario
            </button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Transaction ID</th>
                        <th>Vendor</th>
                        <th>Amount</th>
                        <th>Decision</th>
                        <th>Risk Score</th>
                    </tr>
                </thead>
                <tbody id="resultsBody">
                    <tr id="emptyRow">
                        <td colspan="5" style="text-align:center;color:var(--text-secondary);padding:40px;">
                            No analyses yet. Run a demo scenario to start.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="email-feed">
            <div class="title">
                <span>📨 Live Email Feed</span>
                <span class="status-indicator" id="feedIndicator"></span>
            </div>
            <span id="feedStatus">Awaiting incoming data...</span>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <div class="modal-overlay" id="customModal">
        <div class="modal">
            <h2>Custom BEC Scenario</h2>
            <div class="form-group">
                <label>Email Body (suspicious content)</label>
                <textarea id="customEmailBody" placeholder="e.g., 'Urgent wire transfer needed, change account to...'"></textarea>
            </div>
            <div class="form-group">
                <label>Vendor Name</label>
                <input type="text" id="customVendor" placeholder="e.g., Greenfield Solutions">
            </div>
            <div class="form-group">
                <label>Amount ($)</label>
                <input type="number" id="customAmount" placeholder="500000" step="1">
            </div>
            <div class="form-group">
                <label>Transaction ID</label>
                <input type="text" id="customTxnId" placeholder="CUSTOM-001">
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeCustomModal()">Cancel</button>
                <button class="btn btn-primary" onclick="submitCustomScenario()">Analyze Now</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        let emailsAnalyzed = 0;
        let amountScreened = 0;
        let threatsBlocked = 0;
        let totalLatency = 0;
        let analysisCount = 0;

        async function checkConnection() {
            try {
                const res = await fetch(`${API_BASE}/health`);
                const connected = res.ok;
                document.getElementById('connIndicator').className = `status-indicator ${connected ? '' : 'disconnected'}`;
                document.getElementById('feedIndicator').className = `status-indicator ${connected ? '' : 'disconnected'}`;
                document.getElementById('feedStatus').textContent = connected ? 'Receiving live feed...' : 'Connection lost — retrying...';
            } catch (e) {
                document.getElementById('connIndicator').className = 'status-indicator disconnected';
                document.getElementById('feedIndicator').className = 'status-indicator disconnected';
                document.getElementById('feedStatus').textContent = 'Awaiting incoming data...';
            }
        }
        checkConnection();
        setInterval(checkConnection, 10000);

        function updateStats(decision, amount, latencyMs) {
            emailsAnalyzed++;
            amountScreened += amount;
            if (decision === 'HALT') threatsBlocked++;
            totalLatency += latencyMs;
            analysisCount++;
            const avg = analysisCount > 0 ? Math.round(totalLatency / analysisCount) : 0;

            document.getElementById('emailsAnalyzed').textContent = emailsAnalyzed;
            document.getElementById('amountScreened').textContent = '$' + amountScreened.toLocaleString();
            document.getElementById('threatsBlocked').textContent = threatsBlocked;
            document.getElementById('avgResponse').textContent = avg > 0 ? avg + 'ms' : '—';

            ['emailsAnalyzed','amountScreened','threatsBlocked'].forEach(id => {
                const el = document.getElementById(id);
                el.style.transform = 'scale(1.1)';
                setTimeout(() => el.style.transform = 'scale(1)', 200);
            });
        }

        function formatDecision(decision) {
            if (decision === 'HALT') return '<span class="badge badge-halt">🔴 HALT</span>';
            if (decision === 'REVIEW') return '<span class="badge badge-review">🟡 REVIEW</span>';
            return '<span class="badge badge-approve">🟢 APPROVE</span>';
        }

        function getRiskColor(score) {
            if (score >= 80) return 'risk-high';
            if (score >= 40) return 'risk-mid';
            return 'risk-low';
        }

        function addResultRow(txnId, vendor, amount, decision, riskScore, breakdown, explanation, latencyMs) {
            const tbody = document.getElementById('resultsBody');
            if (document.getElementById('emptyRow')) tbody.innerHTML = '';

            const rowId = `row-${txnId}`;
            const detailId = `detail-${txnId}`;

            const tr = document.createElement('tr');
            tr.id = rowId;
            tr.className = 'expand-row';
            tr.onclick = () => toggleDetail(detailId);
            tr.innerHTML = `
                <td><span class="expand-icon">▶</span> ${txnId}</td>
                <td>${vendor}</td>
                <td>$${amount.toLocaleString()}</td>
                <td>${formatDecision(decision)}</td>
                <td>${riskScore}/100</td>
            `;
            tbody.appendChild(tr);

            const detailDiv = document.createElement('div');
            detailDiv.id = detailId;
            detailDiv.className = 'detail-row';
            detailDiv.innerHTML = `
                <div class="agent-grid">
                    <div class="agent-card">
                        <div class="agent-name">📧 Email Tone Risk</div>
                        <div style="font-size:1.5rem;font-weight:700;">${breakdown.email_tone}%</div>
                        <div class="risk-bar-bg"><div class="risk-bar-fill ${getRiskColor(breakdown.email_tone)}" style="width:${breakdown.email_tone}%"></div></div>
                    </div>
                    <div class="agent-card">
                        <div class="agent-name">🏦 IBAN Change Risk</div>
                        <div style="font-size:1.5rem;font-weight:700;">${breakdown.iban_change}%</div>
                        <div class="risk-bar-bg"><div class="risk-bar-fill ${getRiskColor(breakdown.iban_change)}" style="width:${breakdown.iban_change}%"></div></div>
                    </div>
                    <div class="agent-card">
                        <div class="agent-name">⏱️ Timing Anomaly</div>
                        <div style="font-size:1.5rem;font-weight:700;">${breakdown.timing}%</div>
                        <div class="risk-bar-bg"><div class="risk-bar-fill ${getRiskColor(breakdown.timing)}" style="width:${breakdown.timing}%"></div></div>
                    </div>
                </div>
                <div style="margin-top:12px;">
                    <strong>Analysis:</strong> ${explanation || 'See agent breakdown above.'}
                </div>
                <div style="margin-top:8px;color:var(--text-secondary);">
                    Latency: ${latencyMs}ms
                </div>
            `;
            const detailTr = document.createElement('tr');
            const detailTd = document.createElement('td');
            detailTd.colSpan = 5;
            detailTd.style.padding = '0';
            detailTd.appendChild(detailDiv);
            detailTr.appendChild(detailTd);
            tbody.appendChild(detailTr);
        }

        function toggleDetail(detailId) {
            const detail = document.getElementById(detailId);
            if (!detail) return;
            detail.classList.toggle('show');
            const row = detail.parentElement.parentElement.previousElementSibling;
            if (row && row.classList.contains('expand-row')) row.classList.toggle('expanded');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        async function analyzeTransaction(txnId, payload = null) {
            const start = Date.now();
            try {
                const body = payload || { transaction_id: txnId };
                const res = await fetch(`${API_BASE}/api/analyze`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.error || `API error ${res.status}`);
                }
                const data = await res.json();
                const latency = Date.now() - start;
                const breakdown = {
                    email_tone: data.audit_agent?.email_tone_risk || 0,
                    iban_change: data.audit_agent?.iban_change_risk || 0,
                    timing: data.audit_agent?.timing_risk || 0
                };
                const explanation = data.audit_agent?.explanation || data.threat_hunting?.explanation || '';
                addResultRow(
                    data.transaction_id || txnId,
                    data.vendor || 'Unknown',
                    data.amount || 0,
                    data.consensus_decision || data.decision,
                    data.risk_score ?? 0,
                    breakdown,
                    explanation,
                    latency
                );
                updateStats(data.consensus_decision || data.decision, data.amount || 0, latency);
            } catch (error) {
                showToast(`Error on ${txnId}: ${error.message}`);
                console.error(error);
            }
        }

        async function runAllScenarios() {
            const btn = document.getElementById('runAllBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Running scenarios...';
            const txns = ['TXN-001','TXN-002','TXN-003','TXN-004','TXN-005'];
            document.getElementById('resultsBody').innerHTML = `<tr id="emptyRow"><td colspan="5" style="text-align:center;color:var(--text-secondary);padding:40px;">Running scenarios...</td></tr>`;

            for (const txn of txns) {
                await analyzeTransaction(txn);
                await new Promise(resolve => setTimeout(resolve, 1200));
            }
            btn.disabled = false;
            btn.textContent = '⚡ Run All 5 Demo Scenarios';
        }

        function openCustomModal() {
            document.getElementById('customModal').classList.add('active');
        }

        function closeCustomModal() {
            document.getElementById('customModal').classList.remove('active');
        }

        async function submitCustomScenario() {
            const email_body = document.getElementById('customEmailBody').value.trim();
            const vendor = document.getElementById('customVendor').value.trim();
            const amount = parseFloat(document.getElementById('customAmount').value);
            const txn_id = document.getElementById('customTxnId').value.trim() || 'CUSTOM-001';

            if (!email_body || !vendor || isNaN(amount)) {
                showToast('Please fill all fields correctly.');
                return;
            }

            closeCustomModal();
            const payload = { email_body, vendor, amount, transaction_id: txn_id };
            const start = Date.now();
            try {
                const res = await fetch(`${API_BASE}/api/analyze/custom`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.error || `API error ${res.status}`);
                }
                const data = await res.json();
                const latency = Date.now() - start;
                const breakdown = {
                    email_tone: data.audit_agent?.email_tone_risk || 0,
                    iban_change: data.audit_agent?.iban_change_risk || 0,
                    timing: data.audit_agent?.timing_risk || 0
                };
                const explanation = data.audit_agent?.explanation || data.threat_hunting?.explanation || '';
                addResultRow(
                    data.transaction_id || txn_id,
                    data.vendor || vendor,
                    data.amount || amount,
                    data.consensus_decision || data.decision,
                    data.risk_score ?? 0,
                    breakdown,
                    explanation,
                    latency
                );
                updateStats(data.consensus_decision || data.decision, data.amount || amount, latency);
            } catch (error) {
                showToast(`Custom scenario failed: ${error.message}`);
                console.error(error);
            }
        }

        document.getElementById('customModal').addEventListener('click', function(e) {
            if (e.target === this) closeCustomModal();
        });
    </script>
</body>
</html>
