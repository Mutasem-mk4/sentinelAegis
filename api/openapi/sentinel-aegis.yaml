openapi: 3.1.0
info:
  title: SentinelAegis API
  description: |
    Multi-agent BEC fraud detection system. Three independent Gemini 1.5 Pro agents 
    analyze wire transfer requests for social engineering, banking detail manipulation, 
    and behavioral timing anomalies. A consensus engine produces a final HALT/REVIEW/APPROVE decision.
  version: 1.0.0
  contact:
    name: SentinelAegis Team
    url: https://github.com/Mutasem-mk4/sentinelAegis
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://sentinelaegis-471764064985.us-central1.run.app
    description: Production (Cloud Run)
  - url: http://localhost:8080
    description: Local development

paths:
  /healthz:
    get:
      summary: Health check
      description: Returns system health status. Used by Cloud Run for liveness probes.
      operationId: healthCheck
      tags: [System]
      responses:
        '200':
          description: System is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  model:
                    type: string
                    example: gemini-1.5-pro
                  analysis_count:
                    type: integer
                    example: 42
                  gmail_enabled:
                    type: boolean
                    example: false
                  uptime_seconds:
                    type: integer
                    example: 3600

  /readyz:
    get:
      summary: Readiness check
      description: Signals whether the service is ready to accept traffic.
      operationId: readinessCheck
      tags: [System]
      responses:
        '200':
          description: Service is ready
        '503':
          description: Service is not ready

  /api/stats:
    get:
      summary: Operational metrics
      description: Returns aggregate analysis metrics for the dashboard.
      operationId: getStats
      tags: [Monitoring]
      responses:
        '200':
          description: Current metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Stats'

  /api/transactions:
    get:
      summary: List demo transactions
      description: Returns the 5 pre-loaded demo transaction scenarios.
      operationId: listTransactions
      tags: [Transactions]
      responses:
        '200':
          description: Transaction list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Transaction'

  /api/analyze:
    post:
      summary: Analyze a demo transaction
      description: |
        Runs all 3 AI agents concurrently on the specified demo transaction 
        and returns the consensus decision. This is the core analysis endpoint.
      operationId: analyzeTransaction
      tags: [Analysis]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [transaction_id]
              properties:
                transaction_id:
                  type: string
                  example: TXN-004
      responses:
        '200':
          description: Analysis complete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisResponse'
        '400':
          description: Invalid request
        '404':
          description: Transaction not found
        '429':
          description: Rate limit exceeded

  /api/analyze/custom:
    post:
      summary: Analyze custom transaction data
      description: |
        Accepts user-provided transaction data for ad-hoc BEC analysis.
        All fields except email_body and amount are optional with sensible defaults.
      operationId: analyzeCustom
      tags: [Analysis]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomAnalyzeRequest'
      responses:
        '200':
          description: Analysis complete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisResponse'
        '400':
          description: Invalid request (missing email_body or invalid amount)
        '429':
          description: Rate limit exceeded

  /api/halt/{transactionId}:
    post:
      summary: Manually halt a transaction
      description: Sets a transaction's status to "halted" to prevent processing.
      operationId: haltTransaction
      tags: [Transactions]
      parameters:
        - name: transactionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Transaction halted
        '404':
          description: Transaction not found

  /api/stream:
    get:
      summary: Real-time event stream (SSE)
      description: |
        Server-Sent Events stream for real-time dashboard updates.
        Events include: email_received, analyzing, consensus.
      operationId: streamEvents
      tags: [Monitoring]
      responses:
        '200':
          description: SSE stream established
          content:
            text/event-stream:
              schema:
                type: string

  /api/status:
    get:
      summary: Monitoring status
      description: Returns the current Gmail monitoring state and connected client count.
      operationId: getStatus
      tags: [Monitoring]
      responses:
        '200':
          description: Monitoring status
          content:
            application/json:
              schema:
                type: object
                properties:
                  monitoring:
                    type: boolean
                  inbox:
                    type: string
                  emails_analyzed:
                    type: integer
                  connected_clients:
                    type: integer

components:
  schemas:
    Transaction:
      type: object
      properties:
        id:
          type: string
          example: TXN-004
        vendor:
          type: string
          example: Greenfield Solutions
        amount:
          type: number
          example: 847000
        currency:
          type: string
          example: USD
        iban:
          type: string
          example: GB29NWBK60161331926819
        email_subject:
          type: string
        email_sender:
          type: string
        email_text:
          type: string
        requested_at:
          type: string
          example: "18:47"
        status:
          type: string
          enum: [pending, approved, halted]

    AgentResult:
      type: object
      properties:
        agent_name:
          type: string
          enum: [email_tone, iban_change, timing]
        risk_level:
          type: string
          enum: [HIGH, MEDIUM, LOW]
        confidence:
          type: number
          minimum: 0
          maximum: 1
          example: 0.92
        flags:
          type: array
          items:
            type: string
        explanation:
          type: string

    ConsensusResult:
      type: object
      properties:
        decision:
          type: string
          enum: [HALT, REVIEW, APPROVE]
        risk_score:
          type: integer
          minimum: 0
          maximum: 100
        explanation:
          type: string
        agent_breakdown:
          type: array
          items:
            $ref: '#/components/schemas/AgentResult'

    AnalysisResponse:
      type: object
      properties:
        transaction_id:
          type: string
        consensus:
          $ref: '#/components/schemas/ConsensusResult'
        latency_ms:
          type: integer
        correlation_id:
          type: string

    CustomAnalyzeRequest:
      type: object
      required: [email_body, amount]
      properties:
        email_body:
          type: string
          description: The email text to analyze for BEC indicators
        vendor_name:
          type: string
          default: Unknown Vendor
        amount:
          type: number
          minimum: 0.01
        currency:
          type: string
          default: USD
        current_iban:
          type: string
        previous_iban:
          type: string
        iban_changed_hours_ago:
          type: integer
          default: 0
        requested_at:
          type: string
          description: "HH:MM format"
        typical_window_start:
          type: string
          default: "09:00"
        typical_window_end:
          type: string
          default: "17:00"

    Stats:
      type: object
      properties:
        total_analyses:
          type: integer
        halt_count:
          type: integer
        review_count:
          type: integer
        approve_count:
          type: integer
        avg_latency_ms:
          type: integer
        halt_rate_pct:
          type: number
        agents_per_query:
          type: integer
          example: 3
        uptime_seconds:
          type: integer
